name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl launch --app syn-player-jm --no-deploy --copy-config --yes
        working-directory: streaming-site
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - run: flyctl deploy --app syn-player-jm --ha=false
        working-directory: streaming-site
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
