name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: streaming-site
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINES=$(flyctl m list --app syn-player-jm 2>/dev/null | grep -c '^[a-f0-9]' || echo 0)
          if [ "$MACHINES" = "0" ]; then
            echo "No machines, creating first one..."
            flyctl m run . --app syn-player-jm --yes
          else
            echo "Updating $MACHINES existing machine(s)..."
            flyctl deploy --app syn-player-jm --ha=false
          fi
