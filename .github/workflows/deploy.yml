name: Deploy to Fly.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: streaming-site
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINES=$(flyctl m list --app syn-player-jm --json 2>/dev/null | jq 'length')
          if [ "$MACHINES" = "0" ]; then
            echo "No machines, creating first machine..."
            flyctl m run . \
              --app syn-player-jm \
              --vm-size shared-cpu-1x \
              --vm-memory 256 \
              --port 443:3000/tcp:http:tls \
              --port 80:3000/tcp:http \
              --restart always \
              --yes
          else
            echo "Machines exist, deploying update..."
            flyctl deploy --app syn-player-jm --ha=false
          fi
