<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Syn Player - 登录</title>
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --red: #e50914;
            --red-hover: #f40612;
            --bg-card: rgba(0,0,0,0.75);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #8c8c8c;
            --input-bg: rgba(22,22,22,0.7);
            --input-border: #333;
            --input-focus: #ffffff;
            --error: #e87c03;
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Poster Mosaic Background ===== */
        .poster-mosaic-wrap {
            position: fixed;
            inset: -60px;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            user-select: none;
            /* Gaussian blur on the entire mosaic */
            filter: blur(12px);
            /* Slightly scaled to hide blur edge artifacts */
            transform: scale(1.06);
        }

        .poster-mosaic {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: 75px;
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        @media (min-width: 768px) {
            .poster-mosaic { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); grid-auto-rows: 80px; }
        }

        @media (min-width: 1200px) {
            .poster-mosaic { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); grid-auto-rows: 90px; }
        }

        @media (min-width: 1600px) {
            .poster-mosaic { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); grid-auto-rows: 100px; }
        }

        .poster-mosaic .poster-cell {
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            transition: opacity 0.6s ease;
            opacity: 0;
            border-radius: 2px;
        }

        .poster-mosaic .poster-cell.loaded {
            opacity: 1;
        }

        .poster-mosaic .poster-cell.fading {
            opacity: 0;
        }

        .poster-mosaic .poster-cell.loaded {
            opacity: 1;
        }

        /* Dark gradient overlay — sits above blurred mosaic, creates moody depth */
        .mosaic-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                /* Heavy dark veil — lighter at bottom so poster wall shows through */
                linear-gradient(180deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.50) 25%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.50) 75%, rgba(0,0,0,0.75) 100%),
                /* Side vignettes */
                linear-gradient(90deg, rgba(0,0,0,0.88) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.88) 100%),
                /* Red accent glow */
                radial-gradient(ellipse 800px 600px at 15% 30%, rgba(229,9,20,0.12) 0%, transparent 60%),
                /* Cool blue accent */
                radial-gradient(ellipse 500px 400px at 85% 75%, rgba(30,60,130,0.06) 0%, transparent 60%);
        }

        /* ===== Header ===== */
        .header {
            position: relative;
            z-index: 10;
            padding: 24px 40px;
            display: flex;
            align-items: center;
        }
        .header .logo {
            font-size: 32px;
            text-decoration: none;
            letter-spacing: -1px;
        }
        .header .logo .syn { color: var(--red); font-weight: 900; }
        .header .logo .player { color: #fff; font-weight: 700; }

        /* ===== Main Content ===== */
        .main {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 60px;
        }

        /* ===== Login Card ===== */
        .login-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            border-radius: 4px;
            padding: 48px 68px 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        .login-card h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 28px;
            color: #fff;
        }

        /* ===== Form Fields ===== */
        .field {
            position: relative;
            margin-bottom: 16px;
        }

        .field input {
            width: 100%;
            height: 50px;
            padding: 16px 20px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.15s ease;
        }

        .field input:focus {
            border-color: var(--input-focus);
            background: rgba(40,40,40,0.8);
        }

        .floating-label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.15s ease;
        }

        .field input:focus ~ .floating-label,
        .field input.has-value ~ .floating-label {
            top: 25%;
            font-size: 11px;
            font-weight: 500;
            color: #fff;
        }

        /* ===== Messages ===== */
        .msg {
            font-size: 13px;
            min-height: 20px;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .msg.error { color: var(--error); }
        .msg.success { color: var(--success); }

        /* ===== Submit Button ===== */
        .btn-submit {
            width: 100%;
            height: 48px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.15s ease;
            letter-spacing: 0.5px;
        }
        .btn-submit:hover { background: var(--red-hover); }
        .btn-submit:active { background: #c11119; }
        .btn-submit:disabled { opacity: 0.7; cursor: default; }

        /* ===== Switch Text ===== */
        .switch-row {
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .switch-row a {
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .switch-row a:hover { text-decoration: underline; }
        .switch-row small {
            display: block;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ===== Footer ===== */
        .footer {
            position: relative;
            z-index: 10;
            background: transparent;
            padding: 30px 40px 30px;
        }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 48px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            white-space: nowrap;
        }
        .footer-links a:hover { color: #fff; text-decoration: underline; }
        .footer-lang {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ===== Online User Widget ===== */
        .online-widget {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 99;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20,20,20,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 8px 16px 8px 12px;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .online-widget.active {
            opacity: 1;
            transform: translateY(0);
        }
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            flex-shrink: 0;
            animation: onlinePulse 2s ease-in-out infinite;
            box-shadow: 0 0 6px rgba(76,175,80,0.5);
        }
        @keyframes onlinePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.75); }
        }
        .online-text {
            font-size: 13px;
            color: #8c8c8c;
            white-space: nowrap;
        }
        #onlineCount {
            color: #fff;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* ===== Responsive ===== */
        @media (max-width: 740px) {
            .login-card {
                padding: 30px 24px 30px;
                background: rgba(0,0,0,0.9);
                border: none;
                border-radius: 0;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            .header { padding: 16px 20px; }
            .header .logo { font-size: 24px; }
            .login-card h1 { font-size: 24px; margin-bottom: 20px; }
            .main { padding: 0 0 30px; align-items: flex-start; }
            .footer { padding: 20px; }
            .footer-links { gap: 12px 24px; }
            .poster-mosaic { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
        }

        @media (max-width: 440px) {
            .login-card { padding: 20px 16px 24px; }
            .field input { height: 44px; font-size: 14px; }
            .btn-submit { height: 42px; font-size: 14px; }
        }
    </style>
</head>
<body>

<!-- Poster Mosaic Background -->
<div class="poster-mosaic-wrap">
    <div class="poster-mosaic" id="posterMosaic"></div>
</div>
<div class="mosaic-overlay"></div>

<!-- Header -->
<header class="header">
    <a href="/" class="logo">
        <span class="syn">SYN</span><span class="player">PLAYER</span>
    </a>
</header>

<!-- Main Content -->
<main class="main">
    <div class="login-card">
        <h1 id="authTitle">登录</h1>

        <p class="msg error" id="errorMsg"></p>
        <p class="msg success" id="successMsg"></p>

        <form id="authForm" novalidate>
            <div class="field">
                <input type="text" id="username" placeholder=" " required autocomplete="username">
                <label class="floating-label" for="username">用户名</label>
            </div>

            <div class="field" id="emailField" style="display:none;">
                <input type="email" id="email" placeholder=" " autocomplete="email">
                <label class="floating-label" for="email">电子邮箱</label>
            </div>

            <div class="field">
                <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                <label class="floating-label" for="password">密码</label>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">登 录</button>
        </form>

        <div class="switch-row" style="display:none">
            <span id="switchPrefix">还没有账号？</span><a id="switchLink"> 立即注册</a>
            <small>注册即表示您同意我们的服务条款和隐私政策。<br>我们绝不会在未经您允许的情况下分享您的个人信息。</small>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="footer">
    <div class="footer-links">
        <a href="javascript:;">常见问题</a>
        <a href="javascript:;">帮助中心</a>
        <a href="javascript:;">服务条款</a>
        <a href="javascript:;">隐私政策</a>
        <a href="javascript:;">Cookie 偏好设置</a>
        <a href="javascript:;">企业信息</a>
    </div>
    <div class="footer-lang">
        <i class="fas fa-globe"></i> 简体中文
    </div>
</footer>

<!-- Online User Counter -->
<div class="online-widget" id="onlineWidget">
    <span class="online-dot"></span>
    <span class="online-text"><span id="onlineCount">0</span> 人在线</span>
</div>

<script>
(function() {
    // ===== Poster Mosaic =====
    var mosaic = document.getElementById('posterMosaic');
    var postersPool = [];
    var cells = [];
    var refreshTimer = null;

    // Random interval: 20–60 seconds
    function nextRefreshInterval() {
        return Math.floor(Math.random() * 40000) + 20000;
    }

    // Build grid: fill entire viewport with cells of random span sizes
    function buildGrid() {
        mosaic.innerHTML = '';
        cells = [];
        var baseSize = window.innerWidth >= 1600 ? 140 : window.innerWidth >= 1200 ? 120 : window.innerWidth >= 768 ? 100 : 90;
        var baseRow = window.innerWidth >= 1600 ? 100 : window.innerWidth >= 1200 ? 90 : window.innerWidth >= 768 ? 80 : 75;
        var cols = Math.floor(window.innerWidth / baseSize);
        var rows = Math.floor(window.innerHeight / baseRow) + 2;

        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var cell = document.createElement('div');
                cell.className = 'poster-cell';
                cell.style.backgroundColor = '#1a1a1a';

                var rand = Math.random();
                var colSpan = rand < 0.10 ? 2 : 1;
                var rowSpan = rand < 0.06 ? 2 : (rand < 0.18 ? 2 : 1);

                cell.style.gridColumn = 'span ' + colSpan;
                cell.style.gridRow = 'span ' + rowSpan;

                mosaic.appendChild(cell);
                cells.push({ el: cell });
            }
        }
    }

    // Assign posters to cells randomly
    function assignPosters(posters) {
        if (!posters.length) return;
        // Shuffle a copy of posters for random assignment
        var shuffled = posters.slice().sort(function() { return Math.random() - 0.5; });
        cells.forEach(function(c, i) {
            var poster = shuffled[i % shuffled.length];
            c.el.style.backgroundImage = 'url(' + poster + ')';
            // Staggered fade-in
            var delay = Math.floor(Math.random() * 600);
            setTimeout((function(el) {
                return function() { el.classList.add('loaded'); };
            })(c.el), delay);
        });
    }

    // Refresh: randomly replace a portion of posters (not all at once)
    function refreshPosters() {
        if (!postersPool.length || !cells.length) return;

        // Pick 15-35% of cells to refresh
        var ratio = Math.random() * 0.20 + 0.15;
        var count = Math.max(1, Math.floor(cells.length * ratio));

        // Randomly select cells to refresh
        var indices = [];
        while (indices.length < count) {
            var idx = Math.floor(Math.random() * cells.length);
            if (indices.indexOf(idx) === -1) indices.push(idx);
        }

        // Fade out selected cells
        indices.forEach(function(idx) {
            cells[idx].el.classList.add('fading');
            cells[idx].el.classList.remove('loaded');
        });

        // After fade, assign new random posters and fade in
        setTimeout(function() {
            var shuffled = postersPool.slice().sort(function() { return Math.random() - 0.5; });
            indices.forEach(function(idx, i) {
                cells[idx].el.style.backgroundImage = 'url(' + shuffled[i % shuffled.length] + ')';
            });
            // Staggered fade-in
            indices.forEach(function(idx, i) {
                setTimeout((function(el) {
                    return function() {
                        el.classList.remove('fading');
                        el.classList.add('loaded');
                    };
                })(cells[idx].el), Math.floor(Math.random() * 500));
            });
        }, 500);

        // Schedule next refresh
        refreshTimer = setTimeout(refreshPosters, nextRefreshInterval());
    }

    // Initial load
    buildGrid();

    fetch('/api/videos?limit=120')
        .then(function(r) { return r.json(); })
        .then(function(videos) {
            postersPool = videos
                .filter(function(v) { return v.poster_url; })
                .map(function(v) { return v.poster_url; });

            if (postersPool.length) {
                assignPosters(postersPool);
                // Start random refresh cycle
                refreshTimer = setTimeout(refreshPosters, nextRefreshInterval());
            }
        })
        .catch(function() {
            // Silent fail — background stays dark
        });

    // Rebuild grid on resize (debounced)
    var resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            if (refreshTimer) clearTimeout(refreshTimer);
            buildGrid();
            if (postersPool.length) {
                assignPosters(postersPool);
                refreshTimer = setTimeout(refreshPosters, nextRefreshInterval());
            }
        }, 600);
    });

    // ===== Online Count =====
    var onlineWidget = document.getElementById('onlineWidget');
    var onlineCountEl = document.getElementById('onlineCount');
    var lastOnlineCount = 0;

    function animateCount(el, from, to) {
        var duration = 600;
        var start = performance.now();
        function step(now) {
            var progress = Math.min((now - start) / duration, 1);
            var eased = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.round(from + (to - from) * eased);
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function fetchOnlineCount() {
        fetch('/api/online').then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.count !== undefined && data.count !== lastOnlineCount) {
                animateCount(onlineCountEl, lastOnlineCount, data.count);
                lastOnlineCount = data.count;
            }
            if (data.count > 0) onlineWidget.classList.add('active');
        }).catch(function() {});
    }

    fetchOnlineCount();
    setInterval(fetchOnlineCount, 30000);

    // ===== Auth Logic =====
    var isRegister = false;
    var title = document.getElementById('authTitle');
    var submitBtn = document.getElementById('submitBtn');
    var switchLink = document.getElementById('switchLink');
    var switchPrefix = document.getElementById('switchPrefix');
    var emailField = document.getElementById('emailField');
    var emailInput = document.getElementById('email');
    var errorMsg = document.getElementById('errorMsg');
    var successMsg = document.getElementById('successMsg');

    // Floating label state
    document.querySelectorAll('.field input').forEach(function(input) {
        function sync() { input.classList.toggle('has-value', input.value.length > 0); }
        input.addEventListener('input', sync);
        input.addEventListener('blur', sync);
    });

    // Registration is closed — toggleMode is a no-op
    function toggleMode() {
        isRegister = false;
        title.textContent = '登录';
        submitBtn.textContent = '登 录';
        emailField.style.display = 'none';
        emailInput.required = false;
        errorMsg.textContent = '';
        successMsg.textContent = '';
    }

    switchLink.addEventListener('click', toggleMode);

    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        errorMsg.textContent = '';
        successMsg.textContent = '';

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var email = emailInput.value.trim();

        if (!username) { errorMsg.textContent = '请输入用户名'; return; }
        if (!password) { errorMsg.textContent = '请输入密码'; return; }
        if (isRegister && !email) { errorMsg.textContent = '请输入电子邮箱地址'; return; }
        if (isRegister && password.length < 6) { errorMsg.textContent = '密码至少需要 6 个字符'; return; }

        submitBtn.disabled = true;
        submitBtn.textContent = isRegister ? '正在注册...' : '正在登录...';

        var url = isRegister ? '/api/auth/register' : '/api/auth/login';
        var body = isRegister
            ? { username: username, email: email, password: password }
            : { username: username, password: password };

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }).then(function(r) {
            return r.json().then(function(d) { return { ok: r.ok, data: d }; });
        }).then(function(result) {
            submitBtn.disabled = false;
            submitBtn.textContent = isRegister ? '创建账号' : '登 录';

            if (!result.ok) {
                errorMsg.textContent = result.data.error;
                return;
            }
            if (isRegister) {
                // Auto-login after registration
                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                }).then(function(r2) { return r2.json(); })
                .then(function(loginData) {
                    localStorage.setItem('syn_user_token', loginData.token);
                    localStorage.setItem('syn_user', JSON.stringify(loginData.user));
                    document.cookie = 'syn_user_token=' + loginData.token + '; path=/; max-age=604800; SameSite=Lax';
                    window.location.href = '/home';
                });
            } else {
                localStorage.setItem('syn_user_token', result.data.token);
                localStorage.setItem('syn_user', JSON.stringify(result.data.user));
                document.cookie = 'syn_user_token=' + result.data.token + '; path=/; max-age=604800; SameSite=Lax';
                window.location.href = '/home';
            }
        }).catch(function() {
            submitBtn.disabled = false;
            submitBtn.textContent = isRegister ? '创建账号' : '登 录';
            errorMsg.textContent = '网络连接失败，请检查网络后重试';
        });
    });
})();
</script>
</body>
</html>
