<head>

    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-dashboard">
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <span class="brand-mark"><i class="fas fa-play"></i></span>
            <span class="brand-text"><span class="syn">SYN</span> PLAYER</span>
        </div>
        <div class="sidebar-group">
            <div class="sidebar-title">内容管理</div>
            <button type="button" class="side-link active" id="sideVideosNav"><i class="fas fa-film"></i><span>视频管理</span></button>
            <button type="button" class="side-link" id="sideSeriesNav"><i class="fas fa-layer-group"></i><span>剧集管理</span></button>
            <button type="button" class="side-link" id="sideUsersNav"><i class="fas fa-users"></i><span>用户管理</span></button>
        </div>
        <div class="sidebar-group">
            <div class="sidebar-title">系统操作</div>
            <a class="side-link" href="/" target="_blank"><i class="fas fa-arrow-up-right-from-square"></i><span>访问网站</span></a>
        </div>
        <div class="sidebar-footer">SYN PLAYER 管理系统<br>v2.0</div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div class="header-left">
                <h1><span style="color:#e50914;">SYN</span>PLAYER <span class="tagline">管理后台</span></h1>
            </div>
            <div class="header-actions">
                <a href="/" class="btn-sm" target="_blank">访问网站</a>
                <button class="btn-sm" id="chPwdBtn">修改密码</button>
                <button class="btn-sm btn-logout" id="logoutBtn">退出登录</button>
            </div>
        </header>

        <div class="admin-body">
            <section class="stats-grid">
                <article class="stat-card">
                    <div class="stat-icon"><i class="fas fa-video"></i></div>
                    <div class="stat-label">视频总数</div>
                    <div class="stat-value" id="statTotalVideos">0</div>
                    <div class="stat-sub">当前可管理资源</div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon"><i class="fas fa-list"></i></div>
                    <div class="stat-label">当前页条目</div>
                    <div class="stat-value" id="statCurrentPageCount">0</div>
                    <div class="stat-sub">本页展示数量</div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon"><i class="fas fa-folder"></i></div>
                    <div class="stat-label">分类总数</div>
                    <div class="stat-value" id="statCategoryCount">0</div>
                    <div class="stat-sub">系统分类条目</div>
                </article>
                <article class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>

                <article class="stat-card">

                    <button class="btn-batch" id="batchFillBtn" title="自动为缺少信息的视频补全封面、简介和评分"><i class="fas fa-magic"></i> 批量自动填充</button>

                                <th>评分</th>

<!-- Change Password Modal -->

<script>
const TOKEN = localStorage.getItem('syn_token');
if (!TOKEN) { window.location.href = '/admin'; }

let editingId = null;

// Category label lookup
const CAT_LABELS = {
  trendingMovies: '热门电影', trendingTV: '热门电视剧', trendingAnime: '热门动漫',
  trendingVariety: '热门综艺', liveTV: '纪录解说', liveChannels: '直播专栏', moreRecommend: '更多推荐'
};
function catLabel(key) { return CAT_LABELS[key] || key; }

// Episode management
let episodeCounter = 1;

function createEpisodeRow(name, url) {
  const row = document.createElement('div');
  row.className = 'episode-row';
  const idx = episodeCounter++;
  row.innerHTML = `
    <input type="text" class="ep-name" placeholder="剧集名 (如: 第${String(idx).padStart(2, '0')}集)" value="${name || ''}" style="width:120px">
    <input type="text" class="ep-url" placeholder="m3u8 / mp4 链接" value="${url || ''}" style="flex:1">
    <button type="button" class="btn-ep-remove" title="删除"><i class="fas fa-times"></i></button>
  `;
  row.querySelector('.btn-ep-remove').addEventListener('click', () => {
    const rows = document.querySelectorAll('#episodeList .episode-row');
    if (rows.length <= 1) {
      // Clear the only row instead of removing
      row.querySelector('.ep-name').value = '';
      row.querySelector('.ep-url').value = '';
      row.querySelector('.btn-ep-remove').style.display = 'none';
      return;
    }
    row.remove();
    updateRemoveButtons();
  });
  updateRemoveButtons();
  return row;
}

function updateRemoveButtons() {
  const rows = document.querySelectorAll('#episodeList .episode-row');
  rows.forEach(r => {
    r.querySelector('.btn-ep-remove').style.display = rows.length > 1 ? '' : 'none';
  });
}

// Parse video_url into episodes array
// Supports $$$ multi-source separator — returns all sources' episodes
function parseEpisodes(videoUrl) {
  if (!videoUrl) return [{ name: '', url: '' }];
  var str = String(videoUrl).trim();

  // Handle $$$ multi-source separator — parse all source groups
  var groups = str.split('$$$').filter(Boolean);
  var allEps = [];

  for (var g = 0; g < groups.length; g++) {
    var group = groups[g].trim();

    // Check if it's multi-episode format: name1$url1#name2$url2#...
    if (group.indexOf('$') > -1 || group.indexOf('#') > -1) {
      var parts = group.split('#').filter(Boolean);
      var eps = parts.map(function(part) {
        var dollarIdx = part.indexOf('$');
        if (dollarIdx >= 0) {
          return { name: part.substring(0, dollarIdx).trim(), url: part.substring(dollarIdx + 1).trim() };
        }
        return { name: '', url: part.trim() };
      }).filter(function(ep) { return ep.url && (ep.url.indexOf('http') === 0); });
      if (eps.length > 0) allEps = allEps.concat(eps);
    } else if (group.indexOf('http') === 0) {
      allEps.push({ name: '', url: group });
    }
  }

  // Keep any usable HTTP(S) playback URL so MP4 and resolved source links show in admin too.
  allEps = allEps.filter(function(ep) { return /^https?:\/\//i.test(ep.url) || /^\/\//.test(ep.url); });

  if (allEps.length > 0) return allEps;
  return [{ name: '', url: '' }];
}

function normalizePosterPreviewUrl(url) {
  var raw = String(url || '').trim();
  if (!raw) return '/api/vod/image-proxy?fallback=1';

  if (raw.indexOf('/api/img-proxy?') === 0 || raw.indexOf('/api/tmdb/image-proxy?') === 0) {
    try {
      var q = raw.indexOf('?');
      var params = new URLSearchParams(raw.slice(q + 1));
      var upstream = params.get('url');
      if (upstream) return '/api/vod/image-proxy?url=' + encodeURIComponent(upstream);
    } catch (_) {}
    return '/api/vod/image-proxy?fallback=1';
  }
  if (raw.indexOf('/api/') === 0 || raw.indexOf('data:') === 0 || raw.indexOf('blob:') === 0) return raw;
  if (raw.indexOf('//') === 0) return '/api/vod/image-proxy?url=' + encodeURIComponent('https:' + raw);
  if (/^https?:\/\//i.test(raw)) return '/api/vod/image-proxy?url=' + encodeURIComponent(raw);
  return raw;
}

function unwrapProxyUrl(url) {
  var raw = String(url || '').trim();
  if (!raw) return '';
  if (raw.indexOf('/api/vod/image-proxy?') !== 0 && raw.indexOf('/api/img-proxy?') !== 0 && raw.indexOf('/api/tmdb/image-proxy?') !== 0) {
    return raw;
  }
  try {
    var q = raw.indexOf('?');
    var params = new URLSearchParams(raw.slice(q + 1));
    return params.get('url') || raw;
  } catch (_) {
    return raw;
  }
}

function updatePosterPreview(rawUrl) {
  var posterInput = document.getElementById('vposter');
  var previewImg = document.getElementById('posterPreviewImg');
  var previewTip = document.getElementById('posterPreviewTip');
  if (!posterInput || !previewImg || !previewTip) return;

  var raw = typeof rawUrl === 'string' ? rawUrl : posterInput.value;
  var src = normalizePosterPreviewUrl(raw);
  previewImg.onerror = function() {
    this.onerror = null;
    this.src = '/api/vod/image-proxy?fallback=1';
    previewTip.textContent = '海报地址加载失败，已显示占位图';
  };
  previewImg.src = src;

  if (!String(raw || '').trim()) {
    previewTip.textContent = '未填写海报地址，显示占位图';
  } else {
    previewTip.textContent = '海报预览';
  }
}

// Serialize episodes to video_url format
function serializeEpisodes() {
  const rows = document.querySelectorAll('#episodeList .episode-row');
  const eps = [];
  rows.forEach(r => {
    const name = r.querySelector('.ep-name').value.trim();
    const url = r.querySelector('.ep-url').value.trim();
    if (url) eps.push({ name, url });
  });
  if (eps.length === 0) return '';
  // Single unnamed episode → plain URL
  if (eps.length === 1 && !eps[0].name) return eps[0].url;
  // Multi-episode or named → name$url#name$url
  return eps.map(ep => {
    const epName = ep.name || '全集';
    return epName + '$' + ep.url;
  }).join('#');
}

function rebuildEpisodeRows(episodes) {
  const list = document.getElementById('episodeList');
  list.innerHTML = '';
  episodeCounter = 0;
  if (!episodes || episodes.length === 0) episodes = [{ name: '', url: '' }];
  episodes.forEach(ep => {
    list.appendChild(createEpisodeRow(ep.name || '', ep.url || ''));
  });
  updateRemoveButtons();
}

function firstFilled() {
  for (var i = 0; i < arguments.length; i++) {
    var val = arguments[i];
    if (val !== undefined && val !== null && String(val).trim() !== '') return val;
  }
  return '';
}

function sourcesToVideoUrl(sources) {
  if (!Array.isArray(sources)) return '';
  return sources.map(function(source) {
    var episodes = Array.isArray(source.episodes) ? source.episodes : [];
    return episodes.map(function(ep) {
      var name = ep.episode_name || ep.name || '全集';
      var url = ep.play_url || ep.url || '';
      return url ? (name + '$' + url) : '';
    }).filter(Boolean).join('#');
  }).filter(Boolean).join('$$$');
}

function mergeVideoForEdit(base, detail) {
  var d = detail && detail.data ? detail.data : (detail || {});
  var merged = Object.assign({}, base || {});
  merged.id = firstFilled(merged.id, d.id, d.vod_id);
  merged.vod_id = firstFilled(merged.vod_id, d.vod_id, d.id);
  merged.source = firstFilled(merged.source, d.source);
  merged.title = firstFilled(d.title, d.vod_name, merged.title);
  merged.category = firstFilled(d.category, d.type_name, merged.category);
  merged.description = firstFilled(d.description, d.vod_content, merged.description);
  merged.raw_poster_url = firstFilled(d.raw_poster_url, d.poster, d.vod_pic, merged.raw_poster_url, merged.poster);
  merged.poster = firstFilled(merged.raw_poster_url, merged.poster);
  merged.poster_url = firstFilled(d.poster_url, merged.poster_url);
  merged.raw_backdrop_url = firstFilled(d.raw_backdrop_url, d.backdrop, d.backdrop_url_raw, merged.raw_backdrop_url, merged.backdrop);
  merged.backdrop = firstFilled(merged.raw_backdrop_url, merged.backdrop);
  merged.backdrop_url = firstFilled(d.backdrop_url, merged.backdrop_url);
  merged.video_url = firstFilled(d.video_url, d.vod_play_url, sourcesToVideoUrl(d.sources), sourcesToVideoUrl(d.data && d.data.sources), merged.video_url);
  merged.year = firstFilled(d.year, d.vod_year, merged.year);
  merged.duration = firstFilled(d.duration, merged.duration);
  merged.genre = firstFilled(d.genre, d.vod_type, d.type_name, merged.genre);
  merged.rating = firstFilled(d.rating, d.douban_rating, d.vod_score, merged.rating);
  merged.badge = firstFilled(d.badge, d.vod_remarks, merged.badge);
  merged.series_title = firstFilled(d.series_title, merged.series_title);
  merged.season_label = firstFilled(d.season_label, merged.season_label);
  merged.sort_order = firstFilled(d.sort_order, merged.sort_order, 0);
  merged.is_live = d.is_live !== undefined ? d.is_live : merged.is_live;
  merged.featured = d.featured !== undefined ? d.featured : merged.featured;
  return merged;
}

async function loadVideoForEdit(v) {
  if (!v || !v.id) return v;
  var merged = Object.assign({}, v);
  try {
    var res = await api('/api/videos/' + encodeURIComponent(v.id));
    if (res && res.ok) merged = mergeVideoForEdit(merged, await res.json());
  } catch (_) {}

  var needsVodDetail = merged.source === 'vod' || v.source === 'vod' || (!merged.video_url && merged.vod_id);
  if (needsVodDetail) {
    try {
      var detailRes = await api('/api/vod/detail/' + encodeURIComponent(merged.vod_id || merged.id));
      if (detailRes && detailRes.ok) merged = mergeVideoForEdit(merged, await detailRes.json());
    } catch (_) {}
  }
  return merged;
}

// Check auth on 401
async function api(url, opts = {}) {
  const { headers: customHeaders, ...rest } = opts;
  const merged = { ...(customHeaders || {}) };
  merged['Content-Type'] = 'application/json';
  merged['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(url, { ...rest, headers: merged });
  if (res.status === 401) { localStorage.removeItem('syn_token'); window.location.href = '/admin'; return; }
  return res;
}

  params.set('page', currentPage);
  params.set('limit', '50');

  const res = await fetch('/api/videos?' + params);
  const result = await res.json();
  // Handle both paginated and flat responses
  const videos = result.data || result;
  const hasMore = result.has_more !== undefined ? result.has_more : false;

  setStatValue('statTotalVideos', total);

let autoFillTimer = null;
let autoFillDone = false;        // track if auto-fill has completed for this modal session

// Shared auto-fill function — called by button click or automatic trigger
async function doAutoFill(triggeredBy) {
  const title = document.getElementById('vtitle').value.trim();
  if (!title || title.length < 2) return;

  const btn = document.getElementById('autoFillBtn');
  const origText = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (triggeredBy === 'auto' ? '自动搜索中...' : '搜索中...');
  btn.disabled = true;

  try {
    const year = document.getElementById('vyear').value.trim();
    const category = document.getElementById('vcategory').value.trim();
    let url = '/api/auto-fill?title=' + encodeURIComponent(title);
    if (year) url += '&year=' + encodeURIComponent(year);
    if (category) url += '&category=' + encodeURIComponent(category);
    const res = await api(url);
    if (!res) { btn.innerHTML = origText; btn.disabled = false; return; }
    const json = await res.json();
    if (!json.success) {
      if (triggeredBy === 'manual') alert('未找到匹配的影片信息: ' + (json.msg || '请尝试更精确的标题'));
      btn.innerHTML = origText; btn.disabled = false; return;
    }

    const d = json.data;

    // Only fill empty/default fields, don't overwrite existing data
    function isEmpty(el) { return !el.value.trim() || el.value === '0' || el.value === '0.0'; }
    function hasEpisodes() {
      var rows = document.querySelectorAll('#episodeList .episode-row');
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].querySelector('.ep-url').value.trim()) return true;
      }
      return false;
    }

    const filled = [];
    if (d.title) {
      // Only overwrite title if it looks like a raw search query (short, no special chars)
      var curTitle = document.getElementById('vtitle').value.trim();
      if (!curTitle || curTitle.length < 4 || curTitle === title) {
        document.getElementById('vtitle').value = d.title;
        if (d.title !== curTitle) filled.push('标题');
      }
    }
    if (d.poster && isEmpty(document.getElementById('vposter'))) {
      document.getElementById('vposter').value = d.poster;
      updatePosterPreview(d.poster);
      filled.push('封面');
    }
    if (d.backdrop_url && isEmpty(document.getElementById('vbackdrop'))) {
      document.getElementById('vbackdrop').value = d.backdrop_url;
      filled.push('背景图');
    }
    if (d.year && isEmpty(document.getElementById('vyear'))) {
      document.getElementById('vyear').value = d.year;
      filled.push('年份');
    }
    if (d.rating && isEmpty(document.getElementById('vrating'))) {
      document.getElementById('vrating').value = Math.round((parseFloat(d.rating) || 0) * 10) / 10;
      filled.push('评分');
    }
    if (d.genre && isEmpty(document.getElementById('vgenre'))) {
      document.getElementById('vgenre').value = d.genre;
      filled.push('类型');
    }
    if (d.description && isEmpty(document.getElementById('vdesc'))) {
      document.getElementById('vdesc').value = d.description;
      filled.push('简介');
    }
    if (d.duration && isEmpty(document.getElementById('vduration'))) {
      document.getElementById('vduration').value = d.duration;
      filled.push('时长');
    }
    if (d.video_url && !hasEpisodes()) {
      rebuildEpisodeRows(parseEpisodes(d.video_url));
      filled.push('视频源');
    }

    // Fallback description from director + actors if no synopsis
    if (isEmpty(document.getElementById('vdesc')) && (d.director || d.actors)) {
      let desc = '';
      if (d.director) desc += '导演: ' + d.director;
      if (d.actors) desc += (desc ? '\n' : '') + '主演: ' + d.actors;
      document.getElementById('vdesc').value = desc;
      if (desc) filled.push('简介');
    }

    autoFillDone = true;
    btn.innerHTML = '<i class="fas fa-check"></i> 已填充: ' + (filled.length ? filled.join(', ') : '标题');
    setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 3000);
  } catch (err) {
    btn.innerHTML = origText;
    btn.disabled = false;
    if (triggeredBy === 'manual') alert('搜索失败: ' + err.message);
  }
}

// Batch delete logic
function getSelectedIds() {
  return [...document.querySelectorAll('#videoTable .row-cb:checked')].map(cb => cb.dataset.id);
}
function updateSelectAllState() {
  const cbs = document.querySelectorAll('#videoTable .row-cb');
  const selAll = document.getElementById('selectAll');
  if (!selAll) return;
  const count = document.querySelectorAll('#videoTable .row-cb:checked').length;
  selAll.checked = cbs.length > 0 && count === cbs.length;
  selAll.indeterminate = count > 0 && count < cbs.length;
  document.getElementById('selCount').textContent = count;
  document.getElementById('batchDelBtn').style.display = count > 0 ? '' : 'none';
}
document.getElementById('selectAll').addEventListener('change', function() {
  document.querySelectorAll('#videoTable .row-cb').forEach(cb => { cb.checked = this.checked; });

});

});
document.getElementById('batchDelBtn').addEventListener('click', async function() {
  const ids = getSelectedIds();
  if (ids.length === 0) return;
  if (!confirm('确定要删除选中的 ' + ids.length + ' 条视频吗？此操作不可撤销。')) return;
  try {
    const res = await api('/api/videos/batch-delete', { method: 'POST', body: JSON.stringify({ ids }) });
    if (!res) return;

// Batch auto-fill
let batchPollTimer = null;

async function doBatchFill() {
  if (!confirm('批量自动填充将扫描缺少封面/评分/简介的视频和VOD（最多300条），通过TMDB自动补充信息。\n\n任务在后台运行，您可以继续操作。确定开始吗？')) return;

  const btn = document.getElementById('batchFillBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 启动中...';
  btn.disabled = true;

  try {
    const res = await api('/api/batch-auto-fill', { method: 'POST' });
    if (!res) { btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充'; btn.disabled = false; return; }
    const json = await res.json();
    if (json.success && json.running) {
      startPolling();
    } else {
      alert('启动失败');
      btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充';
      btn.disabled = false;
    }
  } catch (err) {
    alert('网络错误: ' + err.message);
    btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充';
    btn.disabled = false;
  }
}

function startPolling() {
  const btn = document.getElementById('batchFillBtn');
  const updateBtn = (p) => {
    const pct = p.total > 0 ? Math.round(p.done / p.total * 100) : 0;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + pct + '% (' + p.done + '/' + p.total + ') 已更新' + p.updated;
  };

  batchPollTimer = setInterval(async () => {
    try {
      const res = await api('/api/batch-auto-fill/status');
      if (!res) return;
      const json = await res.json();
      if (json.running) {
        updateBtn(json.progress);
      } else {
        clearInterval(batchPollTimer);
        batchPollTimer = null;
        btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充';
        btn.disabled = false;
        const p = json.progress;
        alert('批量填充完成！\n\n共 ' + p.total + ' 条\n成功更新 ' + p.updated + ' 条\n失败 ' + p.failed + ' 条');
        loadVideos();
      }
    } catch {}
  }, 2000);
}

document.getElementById('batchFillBtn').addEventListener('click', doBatchFill);

// Sync status — load on startup
async function loadSyncStatus() {
  try {
    const res = await api('/api/admin/sync-status');
    if (!res) return;
    const data = await res.json();
    const el = document.getElementById('syncStatus');
    if (!el) return;
    let text = `VOD: ${data.vod_count} 条（有源: ${data.vod_with_url}）`;
    if (data.last_sync) {
      const t = data.last_sync.time.replace('T', ' ').substring(0, 16);
      text += ` | 上次采集: ${t} (+${data.last_sync.added}条)`;
    }
    text += ` | 直播: ${data.live_channel_count || 0} 路`;
    if (data.last_live_sync && data.last_live_sync.time) {
      const lt = data.last_live_sync.time.replace('T', ' ').substring(0, 16);
      text += ` | 上次直播同步: ${lt} (+${data.last_live_sync.added || 0})`;
      if (data.last_live_sync.status === 'failed' && data.last_live_sync.error) {
        text += ` [失败: ${data.last_live_sync.error}]`;
      }
    }
    el.textContent = text;
  } catch {}
}

let seriesPreviewData = null;

async function loadSeries() {
  const res = await api('/api/series');
  if (!res) return;
  const series = await res.json();
  const tbody = document.getElementById('seriesTable');
  if (series.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;padding:40px;">暂无系列分组，点击"自动识别系列"开始</td></tr>';
  } else {
    tbody.innerHTML = series.map(s => `
      <tr>
        <td><strong style="color:#e50914;">${s.series_title}</strong></td>
        <td>${s.video_count}</td>
        <td><img src="${s.poster_url || '/api/vod/image-proxy?fallback=1'}" class="thumb-preview" onerror="this.onerror=null;this.src='/api/vod/image-proxy?fallback=1';"></td>
        <td>${catLabel(s.category)}</td>
        <td><button class="btn-sm btn-edit" onclick="viewSeriesDetail('${encodeURIComponent(s.series_title)}')"><i class="fas fa-list"></i> 查看详情</button></td>
        <td><button class="btn-sm btn-del" onclick="ungroupSeries('${encodeURIComponent(s.series_title)}')">取消分组</button></td>
      </tr>
    `).join('');

  document.getElementById('seriesCountInfo').textContent = `共 ${series.length} 个系列`;

async function viewSeriesDetail(encodedTitle) {
  const res = await api('/api/series/' + encodedTitle);
  if (!res) return;
  const data = await res.json();
  let html = `<h3 style="color:#e50914;margin:0 0 16px 0;">${data.series_title} (${data.video_count} 部)</h3>`;
  for (const season of data.seasons) {
    html += `<div style="margin-bottom:12px;"><strong style="color:#ffa500;">${season.label}</strong>`;
    html += '<ul style="margin:4px 0 0 20px;font-size:13px;color:#ccc;">';
    for (const v of season.videos) {
      html += `<li>${v.title} <span style="color:#888;">(ID:${v.id})</span></li>`;
    }
    html += '</ul></div>';
  }
  document.getElementById('seriesPreviewContent').innerHTML = html;
  document.getElementById('seriesPreview').style.display = '';
  document.getElementById('applySeriesBtn').style.display = 'none';
  document.getElementById('cancelSeriesBtn').style.display = '';
}

async function ungroupSeries(encodedTitle) {
  const title = decodeURIComponent(encodedTitle);
  if (!confirm(`确定要取消"${title}"系列的分组吗？所有相关视频将恢复为独立视频。`)) return;
  // Clear series_title for all videos in this series
  const res = await api('/api/series/' + encodedTitle);
  if (!res) return;
  const data = await res.json();
  const ids = [];
  for (const season of data.seasons) {
    for (const v of season.videos) {
      ids.push(v.id);
    }
  }
  let ok = true;
  for (const id of ids) {
    const r = await api('/api/videos/' + id + '/remove-from-series', { method: 'PUT' });
    if (!r || !r.ok) ok = false;
  }
  if (ok) {
    alert('已取消分组');
    loadSeries();
  }
}

function formatDateTime(dt) {
  if (!dt) return '-';
  return dt.replace('T', ' ').replace('Z', '').slice(0, 19);
}

async function loadUsers() {
  const res = await api('/api/auth/users');
  if (!res) return;
  const users = await res.json();
  const tbody = document.getElementById('userTable');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td><strong>${u.username}</strong></td>
      <td>${u.email || '-'}</td>
      <td>${formatDateTime(u.created_at)}</td>
      <td>
        <button class="btn-sm btn-del" onclick="deleteUser(${u.id}, '${u.username}')">删除</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('userCountInfo').textContent = `共 ${users.length} 位注册用户`;
  setStatValue('statUserCount', users.length);
}

async function deleteUser(id, username) {
  if (!confirm(`确定要删除用户 "${username}" 吗？此操作不可撤销。`)) return;
  const res = await api(`/api/auth/users/${id}`, { method: 'DELETE' });
  if (!res) return;
  if (res.ok) {
    loadUsers();
  } else {
    const err = await res.json().catch(() => ({}));
    alert('删除失败: ' + (err.error || res.statusText));
  }
}
