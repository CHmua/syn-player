<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - Syn Player</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-dashboard">
<header class="admin-header">
    <h1><span style="color:#e50914;">SYN</span>PLAYER <span class="tagline">管理后台</span></h1>
    <div class="header-actions">
        <a href="/" class="btn-sm" target="_blank">查看网站</a>
        <button class="btn-sm" id="chPwdBtn">修改密码</button>
        <button class="btn-sm btn-logout" id="logoutBtn">退出</button>
    </div>
</header>

<div class="admin-body">
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="搜索视频...">
        <select id="categoryFilter">
            <option value="">所有分类</option>
        </select>
        <button class="btn-add" id="addBtn">+ 新增视频</button>
        <button class="btn-batch" id="batchFillBtn" title="自动为所有缺少信息的视频补充封面、简介、评分等"><i class="fas fa-magic"></i> 批量自动填充</button>
        <button class="btn-users" id="usersBtn" title="查看注册用户"><i class="fas fa-users"></i> 用户管理</button>
        <button class="btn-del-batch" id="batchDelBtn" title="批量删除选中的视频" style="display:none"><i class="fas fa-trash"></i> 批量删除 (<span id="selCount">0</span>)</button>
    </div>

    <!-- Video management section -->
    <div id="videoSection">
        <!-- Section Tabs — matches homepage layout -->
        <div class="section-tabs" id="sectionTabs">
            <button class="section-tab active" data-category="">全部</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll" title="全选"></th>
                        <th>ID</th>
                        <th>封面</th>
                        <th>轮播</th>
                        <th>标题</th>
                        <th>分类</th>
                        <th>来源</th>
                        <th>角标</th>
                        <th>评分</th>
                        <th>年份</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="videoTable"></tbody>
            </table>
        </div>

        <p class="count-info" id="countInfo"></p>
    </div>

    <!-- User management section -->
    <div id="userSection" style="display:none;">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
        <p class="count-info" id="userCountInfo"></p>
    </div>
</div>

<!-- Edit / Add Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">新增视频</h2>
        <form id="videoForm">
            <input type="hidden" id="vid">
            <div class="form-row">
                <div class="form-group" style="flex:2">
                    <label>标题 *</label>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="vtitle" required style="flex:1">
                        <button type="button" class="btn-auto-fill" id="autoFillBtn" title="从豆瓣自动获取影片信息">
                            <i class="fas fa-magic"></i> 自动填充
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="vcategory" required>
                        <option value="trendingMovies">🎬 热门电影</option>
                        <option value="trendingTV">📺 热门电视剧</option>
                        <option value="trendingAnime">🎨 热门动漫</option>
                        <option value="trendingVariety">🎪 热门综艺</option>
                        <option value="liveTV">📡 纪录解说</option>
                        <option value="moreRecommend">⭐ 更多推荐</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>封面图 URL</label>
                    <input type="text" id="vposter" style="width:100%">
                    <div style="display:flex;gap:8px;margin-top:6px;">
                        <button type="button" class="btn-tmdb" id="tmdbPosterBtn" title="从TMDB搜索电影海报图">
                            <i class="fas fa-image"></i> TMDB搜图
                        </button>
                        <button type="button" class="btn-douban" id="doubanPosterBtn" title="从豆瓣搜索电影海报图">
                            <i class="fas fa-image"></i> 豆瓣搜图
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>背景图 URL (横版16:9，用于首页大屏和轮播)</label>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="vbackdrop" placeholder="TMDB自动填充，留空则使用封面图" style="flex:1">
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex:1">
                    <label>视频源 URL</label>
                    <div id="episodeList">
                        <div class="episode-row">
                            <input type="text" class="ep-name" placeholder="剧集名 (如: 第01集)" style="width:120px">
                            <input type="text" class="ep-url" placeholder="m3u8 / mp4 链接" style="flex:1">
                            <button type="button" class="btn-ep-remove" title="删除" style="display:none"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <button type="button" class="btn-add-ep" id="addEpisodeBtn"><i class="fas fa-plus"></i> 添加剧集</button>
                </div>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="vdesc" rows="2"></textarea>
            </div>
            <div class="form-row cols-4">
                <div class="form-group">
                    <label>年份</label>
                    <input type="text" id="vyear">
                </div>
                <div class="form-group">
                    <label>时长</label>
                    <input type="text" id="vduration" placeholder="如: 2h 23m">
                </div>
                <div class="form-group">
                    <label>类型标签</label>
                    <input type="text" id="vgenre" placeholder="如: 动作 / 冒险">
                </div>
                <div class="form-group">
                    <label>评分</label>
                    <input type="number" id="vrating" step="any" min="0" max="10" value="0">
                </div>
            </div>
            <div class="form-row cols-4">
                <div class="form-group">
                    <label>角标</label>
                    <input type="text" id="vbadge" placeholder="热门推荐/新片上线等">
                </div>
                <div class="form-group">
                    <label>排序</label>
                    <input type="number" id="vsort" value="0">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="vislive"> 直播频道
                    </label>
                </div>
                <div class="form-group" id="featuredGroup">
                    <label class="checkbox-label">
                        <input type="checkbox" id="vfeatured"> 首页轮播推荐
                    </label>
                    <span style="color:#888;font-size:12px;display:block;margin-top:2px;" id="featuredNote"></span>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
                <button type="submit" class="btn-save">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pwdModalOverlay" style="display:none">
    <div class="modal" style="max-width:400px">
        <h2>修改管理员密码</h2>
        <form id="pwdForm">
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" id="pwdCurrent" required>
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="pwdNew" required minlength="6">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="pwdConfirm" required minlength="6">
            </div>
            <p id="pwdMsg" style="font-size:13px;min-height:20px;margin-bottom:8px;"></p>
            <div class="form-actions">
                <button type="button" class="btn-cancel" id="pwdCancelBtn">取消</button>
                <button type="submit" class="btn-save">确认修改</button>
            </div>
        </form>
    </div>
</div>

<script>
const TOKEN = localStorage.getItem('syn_token');
if (!TOKEN) { window.location.href = '/admin'; }

let editingId = null;

// Category label lookup
const CAT_LABELS = {
  trendingMovies: '热门电影', trendingTV: '热门电视剧', trendingAnime: '热门动漫',
  trendingVariety: '热门综艺', liveTV: '纪录解说', moreRecommend: '更多推荐'
};
function catLabel(key) { return CAT_LABELS[key] || key; }

// Episode management
let episodeCounter = 1;

function createEpisodeRow(name, url) {
  const row = document.createElement('div');
  row.className = 'episode-row';
  const idx = episodeCounter++;
  row.innerHTML = `
    <input type="text" class="ep-name" placeholder="剧集名 (如: 第${String(idx).padStart(2, '0')}集)" value="${name || ''}" style="width:120px">
    <input type="text" class="ep-url" placeholder="m3u8 / mp4 链接" value="${url || ''}" style="flex:1">
    <button type="button" class="btn-ep-remove" title="删除"><i class="fas fa-times"></i></button>
  `;
  row.querySelector('.btn-ep-remove').addEventListener('click', () => {
    const rows = document.querySelectorAll('#episodeList .episode-row');
    if (rows.length <= 1) {
      // Clear the only row instead of removing
      row.querySelector('.ep-name').value = '';
      row.querySelector('.ep-url').value = '';
      row.querySelector('.btn-ep-remove').style.display = 'none';
      return;
    }
    row.remove();
    updateRemoveButtons();
  });
  updateRemoveButtons();
  return row;
}

function updateRemoveButtons() {
  const rows = document.querySelectorAll('#episodeList .episode-row');
  rows.forEach(r => {
    r.querySelector('.btn-ep-remove').style.display = rows.length > 1 ? '' : 'none';
  });
}

// Parse video_url into episodes array
function parseEpisodes(videoUrl) {
  if (!videoUrl) return [{ name: '', url: '' }];
  var str = String(videoUrl).trim();

  // Handle $$$ multi-source separator — use first source only
  if (str.indexOf('$$$') > -1) {
    str = str.split('$$$')[0].trim();
  }

  // Check if it's multi-episode format: name1$url1#name2$url2#...
  if (str.indexOf('$') > -1 || str.indexOf('#') > -1) {
    var parts = str.split('#').filter(Boolean);
    var eps = parts.map(function(part) {
      var dollarIdx = part.indexOf('$');
      if (dollarIdx >= 0) {
        return { name: part.substring(0, dollarIdx).trim(), url: part.substring(dollarIdx + 1).trim() };
      }
      return { name: '', url: part.trim() };
    }).filter(function(ep) { return ep.url && (ep.url.indexOf('http') === 0); });
    if (eps.length > 0) return eps;
  }
  // Plain URL
  if (str.indexOf('http') === 0) return [{ name: '', url: str }];
  return [{ name: '', url: '' }];
}

// Serialize episodes to video_url format
function serializeEpisodes() {
  const rows = document.querySelectorAll('#episodeList .episode-row');
  const eps = [];
  rows.forEach(r => {
    const name = r.querySelector('.ep-name').value.trim();
    const url = r.querySelector('.ep-url').value.trim();
    if (url) eps.push({ name, url });
  });
  if (eps.length === 0) return '';
  // Single unnamed episode → plain URL
  if (eps.length === 1 && !eps[0].name) return eps[0].url;
  // Multi-episode or named → name$url#name$url
  return eps.map(ep => {
    const epName = ep.name || '全集';
    return epName + '$' + ep.url;
  }).join('#');
}

function rebuildEpisodeRows(episodes) {
  const list = document.getElementById('episodeList');
  list.innerHTML = '';
  episodeCounter = 0;
  if (!episodes || episodes.length === 0) episodes = [{ name: '', url: '' }];
  episodes.forEach(ep => {
    list.appendChild(createEpisodeRow(ep.name || '', ep.url || ''));
  });
  updateRemoveButtons();
}

document.getElementById('addEpisodeBtn').addEventListener('click', () => {
  document.getElementById('episodeList').appendChild(createEpisodeRow('', ''));
});

// Check auth on 401
async function api(url, opts = {}) {
  const { headers: customHeaders, ...rest } = opts;
  const merged = { ...(customHeaders || {}) };
  merged['Content-Type'] = 'application/json';
  merged['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(url, { ...rest, headers: merged });
  if (res.status === 401) { localStorage.removeItem('syn_token'); window.location.href = '/admin'; return; }
  return res;
}

async function loadVideos() {
  const search = document.getElementById('searchInput').value;
  const category = document.getElementById('categoryFilter').value;
  const activeTab = document.querySelector('#sectionTabs .section-tab.active');
  const params = new URLSearchParams();
  if (activeTab && activeTab.dataset.featured === '1') {
    params.set('featured', '1');
  } else if (search) params.set('search', search);
  else if (category) params.set('category', category);

  const res = await fetch('/api/videos?' + params);
  const videos = await res.json();
  const tbody = document.getElementById('videoTable');
  tbody.innerHTML = videos.map(v => `
    <tr>
      <td><input type="checkbox" class="row-cb" data-id="${v.id}"></td>
      <td>${v.id}</td>
      <td><img src="${v.poster_url || ''}" class="thumb-preview" onerror="this.style.display='none'"></td>
      <td><label class="featured-toggle-wrap" title="设为首页轮播"><input type="checkbox" class="featured-cb" data-id="${v.id}" ${v.featured ? 'checked' : ''}><span class="featured-slider"></span></label></td>
      <td>${v.title}</td>
      <td>${catLabel(v.category)}</td>
      <td><span class="source-tag ${v.source === 'vod' ? 'source-vod' : 'source-local'}">${v.source === 'vod' ? '采集' : '本地'}</span></td>
      <td>${v.badge || '-'}</td>
      <td>${v.rating || '-'}</td>
      <td>${v.year || '-'}</td>
      <td>
        <button class="btn-sm btn-edit" data-id="${v.id}" data-source="${v.source || ''}">编辑</button>
        <button class="btn-sm btn-del" data-id="${v.id}" data-source="${v.source || ''}">删除</button>
      </td>
    </tr>
  `).join('');
  updateSelectAllState();
  document.getElementById('countInfo').textContent = `共 ${videos.length} 条记录`;

  // Bind edit buttons
  tbody.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', () => editVideo(videos.find(v => v.id == btn.dataset.id))));
  tbody.querySelectorAll('.btn-del').forEach(btn => btn.addEventListener('click', () => deleteVideo(btn.dataset.id, btn.dataset.source)));

  // Bind featured toggle checkboxes
  tbody.querySelectorAll('.featured-cb').forEach(cb => cb.addEventListener('change', async function() {
    const id = this.dataset.id;
    const featured = this.checked ? 1 : 0;
    try {
      const res = await api('/api/videos/' + id + '/featured', { method: 'PUT', body: JSON.stringify({ featured }) });
      if (res && !res.ok) { this.checked = !this.checked; alert('更新失败'); return; }
      // If viewing the "轮播" tab, refresh to immediately show/hide the row
      const activeTab = document.querySelector('#sectionTabs .section-tab.active');
      if (activeTab && activeTab.dataset.featured === '1') {
        loadVideos();
      }
    } catch (err) { this.checked = !this.checked; }
  }));

  updateFeaturedCount();
}

async function updateFeaturedCount() {
  try {
    const res = await fetch('/api/videos?featured=1');
    const videos = await res.json();
    const badge = document.getElementById('featuredCountBadge');
    if (badge) badge.textContent = videos.length;
  } catch (e) {}
}

async function loadCategories() {
  const res = await fetch('/api/categories');
  const data = await res.json();
  const homepage = data.homepage || [];
  const all = data.all || [];

  // Populate filter dropdown
  const sel = document.getElementById('categoryFilter');
  homepage.forEach(s => { const o = document.createElement('option'); o.value = s.value; o.textContent = s.label; sel.appendChild(o); });
  // Add any extra categories not in homepage
  all.forEach(c => {
    if (!homepage.some(s => s.value === c)) {
      const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
    }
  });

  // Build section tabs
  const tabsWrap = document.getElementById('sectionTabs');
  homepage.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'section-tab';
    btn.dataset.category = s.value;
    btn.textContent = s.label;
    btn.addEventListener('click', function() {
      tabsWrap.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('categoryFilter').value = this.dataset.category;
      document.getElementById('searchInput').value = '';
      loadVideos();
    });
    tabsWrap.appendChild(btn);
  });

  // "轮播" tab — filter featured videos only
  const featuredTab = document.createElement('button');
  featuredTab.className = 'section-tab';
  featuredTab.dataset.featured = '1';
  featuredTab.innerHTML = '🔥 轮播 <span class="featured-count-badge" id="featuredCountBadge"></span>';
  featuredTab.addEventListener('click', function() {
    tabsWrap.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('categoryFilter').value = '';
    document.getElementById('searchInput').value = '';
    loadVideos();
  });
  tabsWrap.appendChild(featuredTab);

  // "全部" tab click handler
  tabsWrap.querySelector('.section-tab[data-category=""]').addEventListener('click', function() {
    tabsWrap.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('categoryFilter').value = '';
    document.getElementById('searchInput').value = '';
    loadVideos();
  });
}

function editVideo(v) {
  editingId = v.id;
  document.getElementById('modalTitle').textContent = '编辑视频';
  document.getElementById('vid').value = v.id;
  document.getElementById('vtitle').value = v.title;
  // Ensure category option exists — VODs use Chinese type names not in the select
  const catSel = document.getElementById('vcategory');
  if (v.category && !Array.from(catSel.options).some(o => o.value === v.category)) {
    const opt = document.createElement('option');
    opt.value = v.category;
    opt.textContent = v.category;
    catSel.insertBefore(opt, catSel.firstChild);
  }
  catSel.value = v.category;
  document.getElementById('vdesc').value = v.description || '';
  document.getElementById('vposter').value = v.poster_url || '';
  document.getElementById('vbackdrop').value = v.backdrop_url || '';
  rebuildEpisodeRows(parseEpisodes(v.video_url || ''));
  document.getElementById('vyear').value = v.year || '';
  document.getElementById('vduration').value = v.duration || '';
  document.getElementById('vgenre').value = v.genre || '';
  document.getElementById('vrating').value = v.rating || 0;
  document.getElementById('vbadge').value = v.badge || '';
  document.getElementById('vsort').value = v.sort_order || 0;
  document.getElementById('vislive').checked = v.is_live === 1;
  document.getElementById('vfeatured').checked = v.featured === 1;
  document.getElementById('modalOverlay').classList.add('active');
}

function resetForm() {
  editingId = null;
  autoFillDone = false;
  document.getElementById('modalTitle').textContent = '新增视频';
  document.getElementById('videoForm').reset();
  document.getElementById('featuredGroup').style.display = '';
  document.getElementById('featuredNote').textContent = '';
  rebuildEpisodeRows([{ name: '', url: '' }]);
}

document.getElementById('addBtn').addEventListener('click', () => {
  resetForm();
  document.getElementById('modalOverlay').classList.add('active');
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
});

let autoFillTimer = null;
let autoFillDone = false;        // track if auto-fill has completed for this modal session

// Shared auto-fill function — called by button click or automatic trigger
async function doAutoFill(triggeredBy) {
  const title = document.getElementById('vtitle').value.trim();
  if (!title || title.length < 2) return;

  const btn = document.getElementById('autoFillBtn');
  const origText = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + (triggeredBy === 'auto' ? '自动搜索中...' : '搜索中...');
  btn.disabled = true;

  try {
    const year = document.getElementById('vyear').value.trim();
    let url = '/api/auto-fill?title=' + encodeURIComponent(title);
    if (year) url += '&year=' + encodeURIComponent(year);
    const res = await api(url);
    if (!res) { btn.innerHTML = origText; btn.disabled = false; return; }
    const json = await res.json();
    if (!json.success) {
      if (triggeredBy === 'manual') alert('未找到匹配的影片信息: ' + (json.msg || '请尝试更精确的标题'));
      btn.innerHTML = origText; btn.disabled = false; return;
    }

    const d = json.data;

    // Only fill empty/default fields, don't overwrite existing data
    function isEmpty(el) { return !el.value.trim() || el.value === '0' || el.value === '0.0'; }
    function hasEpisodes() {
      var rows = document.querySelectorAll('#episodeList .episode-row');
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].querySelector('.ep-url').value.trim()) return true;
      }
      return false;
    }

    const filled = [];
    if (d.title) {
      // Only overwrite title if it looks like a raw search query (short, no special chars)
      var curTitle = document.getElementById('vtitle').value.trim();
      if (!curTitle || curTitle.length < 4 || curTitle === title) {
        document.getElementById('vtitle').value = d.title;
        if (d.title !== curTitle) filled.push('标题');
      }
    }
    if (d.poster && isEmpty(document.getElementById('vposter'))) {
      document.getElementById('vposter').value = d.poster;
      filled.push('封面');
    }
    if (d.backdrop_url && isEmpty(document.getElementById('vbackdrop'))) {
      document.getElementById('vbackdrop').value = d.backdrop_url;
      filled.push('背景图');
    }
    if (d.year && isEmpty(document.getElementById('vyear'))) {
      document.getElementById('vyear').value = d.year;
      filled.push('年份');
    }
    if (d.rating && isEmpty(document.getElementById('vrating'))) {
      document.getElementById('vrating').value = Math.round((parseFloat(d.rating) || 0) * 10) / 10;
      filled.push('评分');
    }
    if (d.genre && isEmpty(document.getElementById('vgenre'))) {
      document.getElementById('vgenre').value = d.genre;
      filled.push('类型');
    }
    if (d.description && isEmpty(document.getElementById('vdesc'))) {
      document.getElementById('vdesc').value = d.description;
      filled.push('简介');
    }
    if (d.duration && isEmpty(document.getElementById('vduration'))) {
      document.getElementById('vduration').value = d.duration;
      filled.push('时长');
    }
    if (d.video_url && !hasEpisodes()) {
      rebuildEpisodeRows(parseEpisodes(d.video_url));
      filled.push('视频源');
    }

    // Fallback description from director + actors if no synopsis
    if (isEmpty(document.getElementById('vdesc')) && (d.director || d.actors)) {
      let desc = '';
      if (d.director) desc += '导演: ' + d.director;
      if (d.actors) desc += (desc ? '\n' : '') + '主演: ' + d.actors;
      document.getElementById('vdesc').value = desc;
      if (desc) filled.push('简介');
    }

    autoFillDone = true;
    btn.innerHTML = '<i class="fas fa-check"></i> 已填充: ' + (filled.length ? filled.join(', ') : '标题');
    setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 3000);
  } catch (err) {
    btn.innerHTML = origText;
    btn.disabled = false;
    if (triggeredBy === 'manual') alert('搜索失败: ' + err.message);
  }
}

// Batch delete logic
function getSelectedIds() {
  return [...document.querySelectorAll('#videoTable .row-cb:checked')].map(cb => parseInt(cb.dataset.id));
}
function updateSelectAllState() {
  const cbs = document.querySelectorAll('#videoTable .row-cb');
  const selAll = document.getElementById('selectAll');
  if (!selAll) return;
  const count = document.querySelectorAll('#videoTable .row-cb:checked').length;
  selAll.checked = cbs.length > 0 && count === cbs.length;
  selAll.indeterminate = count > 0 && count < cbs.length;
  document.getElementById('selCount').textContent = count;
  document.getElementById('batchDelBtn').style.display = count > 0 ? '' : 'none';
}
document.getElementById('selectAll').addEventListener('change', function() {
  document.querySelectorAll('#videoTable .row-cb').forEach(cb => { cb.checked = this.checked; });
  updateSelectAllState();
});
document.getElementById('videoTable').addEventListener('change', function(e) {
  if (e.target.classList.contains('row-cb')) updateSelectAllState();
});
document.getElementById('batchDelBtn').addEventListener('click', async function() {
  const ids = getSelectedIds();
  if (ids.length === 0) return;
  if (!confirm('确定要删除选中的 ' + ids.length + ' 条视频吗？此操作不可撤销。')) return;
  try {
    const res = await api('/api/videos/batch-delete', { method: 'POST', body: JSON.stringify({ ids }) });
    if (!res) return;
    if (res.ok) {
      const data = await res.json();
      alert('已删除 ' + (data.videos_deleted || 0) + ' 条视频记录');
      loadVideos();
    } else {
      const err = await res.json().catch(() => ({}));
      alert('批量删除失败: ' + (err.error || ''));
    }
  } catch (err) {
    alert('网络错误: ' + err.message);
  }
});

  var cur = document.getElementById('pwdCurrent').value;

  if (newPwd.length < 6) { msg.style.color = '#e50914'; msg.textContent = '新密码至少需要6个字符'; return; }

// Batch auto-fill
let batchPollTimer = null;

async function doBatchFill() {
  if (!confirm('批量自动填充将扫描缺少封面/评分/简介的视频和VOD（最多300条），通过TMDB自动补充信息。\n\n任务在后台运行，您可以继续操作。确定开始吗？')) return;

  const btn = document.getElementById('batchFillBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 启动中...';
  btn.disabled = true;

  try {
    const res = await api('/api/batch-auto-fill', { method: 'POST' });
    if (!res) { btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充'; btn.disabled = false; return; }
    const json = await res.json();
    if (json.success && json.running) {
      startPolling();
    } else {
      alert('启动失败');
      btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充';
      btn.disabled = false;
    }
  } catch (err) {
    alert('网络错误: ' + err.message);
    btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充';
    btn.disabled = false;
  }
}

function startPolling() {
  const btn = document.getElementById('batchFillBtn');
  const updateBtn = (p) => {
    const pct = p.total > 0 ? Math.round(p.done / p.total * 100) : 0;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + pct + '% (' + p.done + '/' + p.total + ') 已更新' + p.updated;
  };

  batchPollTimer = setInterval(async () => {
    try {
      const res = await api('/api/batch-auto-fill/status');
      if (!res) return;
      const json = await res.json();
      if (json.running) {
        updateBtn(json.progress);
      } else {
        clearInterval(batchPollTimer);
        batchPollTimer = null;
        btn.innerHTML = '<i class="fas fa-magic"></i> 批量自动填充';
        btn.disabled = false;
        const p = json.progress;
        alert('批量填充完成！\n\n共 ' + p.total + ' 条\n成功更新 ' + p.updated + ' 条\n失败 ' + p.failed + ' 条');
        loadVideos();
      }
    } catch {}
  }, 2000);
}

document.getElementById('batchFillBtn').addEventListener('click', doBatchFill);

function formatDateTime(dt) {
  if (!dt) return '-';
  return dt.replace('T', ' ').replace('Z', '').slice(0, 19);
}

async function loadUsers() {
  const res = await api('/api/auth/users');
  if (!res) return;
  const users = await res.json();
  const tbody = document.getElementById('userTable');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td><strong>${u.username}</strong></td>
      <td>${u.email || '-'}</td>
      <td>${formatDateTime(u.created_at)}</td>
      <td>
        <button class="btn-sm btn-del" onclick="deleteUser(${u.id}, '${u.username}')">删除</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('userCountInfo').textContent = `共 ${users.length} 位注册用户`;
}

async function deleteUser(id, username) {
  if (!confirm(`确定要删除用户 "${username}" 吗？此操作不可撤销。`)) return;
  const res = await api(`/api/auth/users/${id}`, { method: 'DELETE' });
  if (!res) return;
  if (res.ok) {
    loadUsers();
  } else {
    const err = await res.json().catch(() => ({}));
    alert('删除失败: ' + (err.error || res.statusText));
  }
}
