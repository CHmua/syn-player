<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Syn Player 管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0d0d0d;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --border: #333;
            --text: #fff;
            --text-secondary: #999;
            --text-muted: #666;
            --red: #e50914;
            --red-hover: #f40612;
            --shadow: 0 8px 40px rgba(0,0,0,0.6);
            --glass: rgba(26,26,26,0.85);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f2f5;
                --bg-card: #ffffff;
                --bg-input: #f5f6f8;
                --border: #e0e0e0;
                --text: #1a1a1a;
                --text-secondary: #666;
                --text-muted: #999;
                --red: #e50914;
                --red-hover: #c11119;
                --shadow: 0 8px 40px rgba(0,0,0,0.10);
                --glass: rgba(255,255,255,0.9);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        /* Animated background shapes */
        .bg-shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.07;
        }
        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
        }
        .shape-1 {
            width: 500px; height: 500px;
            background: #e50914;
            top: -200px; right: -150px;
            animation: float1 20s ease-in-out infinite;
        }
        .shape-2 {
            width: 400px; height: 400px;
            background: #0078d4;
            bottom: -150px; left: -100px;
            animation: float2 25s ease-in-out infinite;
        }
        .shape-3 {
            width: 300px; height: 300px;
            background: #7c3aed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: float3 18s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, 40px) scale(1.1); }
            66% { transform: translate(30px, -30px) scale(0.9); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.15); }
            66% { transform: translate(-40px, 20px) scale(0.85); }
        }
        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        @media (prefers-color-scheme: light) {
            .bg-shapes { opacity: 0.06; }
        }

        /* Login container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-card {
            background: var(--glass);
            border-radius: 16px;
            padding: 44px 40px 36px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header .brand {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .login-header .brand .syn { color: var(--red); }
        .login-header .brand .player { color: var(--text); }
        .login-header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* Theme indicator */
        .theme-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .theme-indicator:hover {
            color: var(--text);
            border-color: var(--red);
        }
        .theme-indicator .fa-sun { display: none; }
        .theme-indicator .fa-moon { display: inline-block; }
        @media (prefers-color-scheme: light) {
            .theme-indicator .fa-sun { display: inline-block; }
            .theme-indicator .fa-moon { display: none; }
        }

        /* Form */
        .field {
            position: relative;
            margin-bottom: 18px;
        }
        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            transition: color 0.2s;
            pointer-events: none;
        }
        .field input {
            width: 100%;
            height: 48px;
            padding: 0 14px 0 42px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }
        .field input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(229,9,20,0.12);
        }
        .field input:focus ~ .field-icon {
            color: var(--red);
        }
        .field input::placeholder {
            color: var(--text-muted);
        }

        .error-msg {
            color: #e50914;
            font-size: 13px;
            min-height: 20px;
            margin-bottom: 8px;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            height: 48px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            background: var(--red-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(229,9,20,0.3);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        /* Loading spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-secondary); }
        .back-link i { margin-right: 4px; }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card { padding: 32px 24px 28px; border-radius: 12px; }
            .login-header .brand { font-size: 24px; }
            .field input { height: 44px; font-size: 14px; }
            .btn-login { height: 44px; font-size: 15px; }
        }
    </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
</div>

<!-- Login card -->
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="brand"><span class="syn">SYN</span><span class="player">PLAYER</span></div>
            <div class="subtitle">管 理 后 台</div>
        </div>

        <form id="loginForm">
            <div class="field">
                <input type="text" id="username" placeholder="用户名" required autocomplete="username">
                <i class="fas fa-user field-icon"></i>
            </div>
            <div class="field">
                <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
                <i class="fas fa-lock field-icon"></i>
            </div>
            <p class="error-msg" id="loginError"></p>
            <button type="submit" class="btn-login" id="submitBtn">
                <span class="btn-text">登 录</span>
                <span class="spinner"></span>
            </button>
        </form>
    </div>
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 返回网站首页</a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('submitBtn');
  errorEl.textContent = '';
  btn.classList.add('loading');
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) { errorEl.textContent = data.error; return; }
    localStorage.setItem('syn_token', data.token);
    window.location.href = '/admin/dashboard';
  } catch (err) {
    errorEl.textContent = '连接服务器失败';
  } finally {
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
