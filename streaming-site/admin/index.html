<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Syn Player 管理后台</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-login">
<div class="login-container">
    <div class="login-card">
        <h1><span style="color:#e50914;">SYN</span>PLAYER</h1>
        <p class="subtitle">管理后台</p>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <p class="error-msg" id="loginError"></p>
            <button type="submit" class="btn-login">登 录</button>
        </form>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) { errorEl.textContent = data.error; return; }
    localStorage.setItem('syn_token', data.token);
    window.location.href = '/admin/dashboard';
  } catch (err) {
    errorEl.textContent = '连接服务器失败';
  }
});
</script>
</body>
</html>
